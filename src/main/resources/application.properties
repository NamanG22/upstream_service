spring.application.name=upstream-service
server.port=9090

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

app.kafka.events-topic=events

app.event-id.counter-file=./data/event-id.counter
app.transaction-id.counter-file=./data/transaction-id.counter
app.merchant-id.counter-file=./data/merchant-id.counter
app.customer-id.counter-file=./data/customer-id.counter

app.transaction.delay.upi-qr.min-ms=2000
app.transaction.delay.upi-qr.max-ms=120000
app.transaction.delay.online-checkout.min-ms=10000
app.transaction.delay.online-checkout.max-ms=300000

spring.jackson.time-zone=Asia/Kolkata
